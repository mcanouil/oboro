project:
  type: website
  output-dir: _site
  resources:
    # Published verbatim so `curl -fsSL .../install.sh | bash` works.
    - install.sh

lang: en-GB
date-format: "dddd[, the] Do [of] MMMM, YYYY"

website:
  title: "Oboro"
  description: "An anonymisation layer between your files and a language model."
  site-url: "https://m.canouil.dev/oboro/"
  repo-url: "https://github.com/mcanouil/oboro"
  repo-actions: [edit, issue]
  repo-link-target: _blank
  repo-link-rel: noopener noreferrer
  open-graph: true
  page-navigation: true
  back-to-top-navigation: true
  llms-txt: true
  search:
    location: navbar
    type: overlay
  navbar:
    title: "Oboro"
    # Pinned to the night palette in both schemes: the navbar-scoped tokens in
    # theme.scss are then identical in the light and dark compiles, so the
    # widget menu and the toggle cannot invert or go invisible.
    background: dark
    foreground: light
    search: true
    left:
      # - href: index.qmd
      #   text: "{{< iconify octicon:home-16 title='Home' label='Home' >}} Home"
      - href: quickstart.qmd
        text: "{{< iconify octicon:rocket-16 title='Quickstart' label='Quickstart' >}} Quickstart"
      - href: docker.qmd
        text: "{{< iconify octicon:container-16 title='Docker' label='Docker' >}} Docker"
      - href: reference.qmd
        text: "{{< iconify octicon:book-16 title='Reference' label='Reference' >}} Reference"
      - href: how-it-works.qmd
        text: "{{< iconify octicon:gear-16 title='How it works' label='How it works' >}} How it works"
      - href: changelog.qmd
        text: "{{< iconify octicon:history-16 title='Changelog' label='Changelog' >}} Changelog"
        aria-label: "Changelog"
    right:
      - text: "{{< iconify octicon:mark-github-16 title='GitHub' label='GitHub' >}}"
        href: "#github-widget"
        aria-label: GitHub repository
  sidebar:
    style: floating
    contents:
      - section: "Using oboro"
        contents:
          - index.qmd
          - quickstart.qmd
          - docker.qmd
          - configuration.qmd
          - reference.qmd
      - section: "Understanding it"
        contents:
          - how-it-works.qmd
          - confidentiality.qmd
          - limitations.qmd
      - section: "Contributing"
        contents:
          - development.qmd
      - changelog.qmd
  page-footer:
    border: true
    background: dark
    foreground: light
    left: |
      Powered by [{{< iconify simple-icons:quarto title="Quarto" label="Quarto" >}} Quarto](https://quarto.org).
    center: |
      &copy; []{#current-year} [Mickaël Canouil](https://mickael.canouil.fr). [{{< iconify octicon:heart-fill-16 title="Heart" label="Heart" >}} Sponsor](https://github.com/sponsors/mcanouil?o=esb).
    right: |
      Licence: [MIT](https://github.com/mcanouil/oboro?tab=MIT-1-ov-file#readme).

brand: _brand.yml

format:
  html:
    # brand drives the per-mode palette from _brand.yml, so the light and dark
    # stylesheets compile with different $body-bg/$body-color; theme.scss reads
    # those through body-mix(). The same list serves both modes, via an anchor.
    theme:
      light: &theme
        - brand
        - assets/theme.scss
      dark: *theme
    respect-user-color-scheme: true
    syntax-highlighting:
      light: github-light
      dark: github-dark
    include-before-body:
      - file: assets/scripts/skip-link.html
    include-after-body:
      - file: assets/scripts/placeholders.html
      - file: assets/scripts/current-year.html
      - file: assets/scripts/external-links.html
      - file: assets/scripts/ordinal-dates.html
      - file: assets/scripts/a11y-fixes.html
      - file: assets/scripts/navbar-tooltips.html
      - file: assets/scripts/github-widget.html
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    anchor-sections: true
    link-external-newwindow: true

filters:
  - at: pre-quarto
    path: code-window

extensions:
  code-window:
    style: "macos"
    # Blocks here are either a command to run or the output it produced, and
    # both are labelled explicitly, so a language-derived label would only add
    # noise.
    auto-filename: false
