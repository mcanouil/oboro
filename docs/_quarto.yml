project:
  type: website
  output-dir: ../_site

website:
  title: "oboro"
  description: "An anonymisation layer between your files and a language model."
  site-url: "https://m.canouil.dev/oboro/"
  repo-url: "https://github.com/mcanouil/oboro"
  repo-actions: [issue, edit]
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: quickstart.qmd
        text: Quickstart
      - href: docker.qmd
        text: Docker
      - href: reference.qmd
        text: Reference
      - href: how-it-works.qmd
        text: How it works
    right:
      - text: "{{< iconify octicon:mark-github-16 >}}"
        href: "#github-widget"
        aria-label: GitHub repository
  sidebar:
    style: floating
    contents:
      - section: "Using oboro"
        contents:
          - index.qmd
          - quickstart.qmd
          - docker.qmd
          - configuration.qmd
          - reference.qmd
      - section: "Understanding it"
        contents:
          - how-it-works.qmd
          - confidentiality.qmd
          - limitations.qmd
      - section: "Contributing"
        contents:
          - development.qmd
  page-footer:
    left: "MIT licensed."
    right: "Nothing on this site is sent anywhere. Neither is anything oboro reads."

format:
  html:
    theme:
      light: [cosmo, assets/theme.scss]
      dark: [cosmo, assets/theme.scss]
    # Pinned rather than left to the default, which is tuned for a white code
    # background and loses contrast against a tinted one.
    syntax-highlighting:
      light: github-light
      dark: github-dark
    include-after-body:
      - file: assets/scripts/placeholders.html
      - file: assets/scripts/github-widget.html
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    anchor-sections: true
