name: Bug report
description: Report an error or unexpected behaviour
labels:
  - "Type: Bug :bug:"

body:
  - type: markdown
    attributes:
      value: |
        Welcome!

  - type: checkboxes
    attributes:
      label: "I have checked the following"
      options:
        - label: I have searched the issue tracker for similar issues
          required: true
        - label: I am not pasting any real sensitive value; I reproduced this with invented data
          required: true

  - type: textarea
    attributes:
      label: Bug description
      description: Description of the bug.
      placeholder: Please describe the bug here.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Command and input
      description: |
        The command you ran and the input format (`.txt`, `.md`, `.docx`, `.xlsx`, `.pdf`, an image, standard input).
      placeholder: |
        oboro clean contract.docx
        Input: .docx exported from LibreOffice Writer
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce this bug, using invented data.

  - type: textarea
    attributes:
      label: Actual behaviour
      description: Tell us what happens instead.

  - type: textarea
    attributes:
      label: Expected behaviour
      description: Tell us what should happen.

  - type: textarea
    attributes:
      label: Your environment
      description: |
        Paste the output of `oboro doctor` (it reports the version and which features are compiled in), and tell us your operating system.
      placeholder: |
        oboro doctor
        OS: macOS 15 | Windows 11 | Ubuntu 24.04
      render: text

  - type: markdown
    attributes:
      value: "_Thanks for submitting this bug report!_"
