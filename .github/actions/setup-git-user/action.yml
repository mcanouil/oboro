name: Setup Git User
description: Configure the git user identity from a GitHub App (minted inline or supplied by the caller).

inputs:
  gh-app-id:
    description: "GitHub App ID (used only when `token` is not supplied)."
    required: false
    default: ""
  app-key:
    description: "GitHub App private key (used only when `token` is not supplied)."
    required: false
    default: ""
  gh-token:
    description: "Fallback GitHub token surfaced via outputs.token when no App credentials are available."
    required: false
    default: ""
  token:
    description: "Pre-minted App token. When set, the action skips its own `actions/create-github-app-token` call and trusts the caller's token + `app-slug`."
    required: false
    default: ""
  app-slug:
    description: "App slug paired with `token` (e.g. `mcanouil-dev`). Required when `token` is set."
    required: false
    default: ""

outputs:
  token:
    description: "Resolved token (caller-supplied App token, internal App token, or fallback)."
    value: ${{ inputs.token != '' && inputs.token || steps.app-token.outputs.token || inputs.gh-token }}

runs:
  using: composite
  steps:
    - name: Create GitHub App token
      id: app-token
      if: ${{ inputs.token == '' && inputs.gh-app-id != '' }}
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.gh-app-id }}
        private-key: ${{ inputs.app-key }}

    - name: Resolve App slug
      id: resolve-slug
      shell: bash
      env:
        CALLER_SLUG: ${{ inputs.app-slug }}
        MINTED_SLUG: ${{ steps.app-token.outputs.app-slug }}
      run: |
        if [ -n "${CALLER_SLUG}" ]; then
          echo "slug=${CALLER_SLUG}" >> "${GITHUB_OUTPUT}"
        else
          echo "slug=${MINTED_SLUG}" >> "${GITHUB_OUTPUT}"
        fi

    - name: Get GitHub App user id
      id: get-user-id
      if: ${{ steps.resolve-slug.outputs.slug != '' }}
      env:
        GH_TOKEN: ${{ inputs.token != '' && inputs.token || steps.app-token.outputs.token }}
        APP_SLUG: ${{ steps.resolve-slug.outputs.slug }}
      shell: bash
      run: |
        echo "user-id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >> "${GITHUB_OUTPUT}"

    - name: Configure git user
      env:
        APP_SLUG: ${{ steps.resolve-slug.outputs.slug }}
        USER_ID: ${{ steps.get-user-id.outputs.user-id }}
      shell: bash
      run: |
        if [ -z "${APP_SLUG}" ]; then
          USER_NAME="github-actions[bot]"
          USER_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
        else
          USER_NAME="${APP_SLUG}[bot]"
          USER_EMAIL="${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
        fi
        git config --global user.name "${USER_NAME}"
        git config --global user.email "${USER_EMAIL}"
