name: Deploy Documentation

# The site publishes only at a release (through the Release workflow's call
# below) or on a manual dispatch, not on every push to main. Pull requests
# still render it, so a broken page is caught before it lands.
on:
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Commit or ref to build (defaults to the triggering ref)."
        type: string
        required: false
        default: ""

# Only the deploy job touches Pages, and it raises its own permissions.
permissions:
  contents: read

# Pages accepts one deployment at a time, so queue rather than cancel. Pull
# requests never deploy, so they get a per-ref group and can run in parallel.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('docs-pr-{0}', github.ref) || 'pages' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Render site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Quarto CLI
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: release

      - name: Render site
        run: quarto render docs

      - name: Upload site artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: docs/_site
          retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site
          path: _site

      - name: Prepare site for deployment
        run: touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Summary
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          {
            echo "## Documentation deploy"
            echo ""
            echo "- URL: ${PAGE_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"
