name: Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Build release binary
        run: cargo build --release

  ocr:
    name: Test with OCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev libleptonica-dev libtesseract-dev \
            tesseract-ocr tesseract-ocr-eng tesseract-ocr-fra

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Lint
        run: cargo clippy --all-targets --features ocr -- -D warnings

      - name: Test
        run: cargo test --all-targets --features ocr

  ner:
    name: Test with the recognition model feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Lint
        run: cargo clippy --all-targets --features ner -- -D warnings

      # The model-backed calibration tests stay ignored here: they need a
      # 348 MB download, and CI verifies that the code compiles and that
      # everything not needing weights still passes.
      - name: Test
        run: cargo test --all-targets --features ner
