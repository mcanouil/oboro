name: Docker

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  # Build without pushing, so a broken Dockerfile is caught before it lands.
  pull_request:
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Native runners rather than QEMU: emulating a Rust build costs
          # more time than the whole rest of this workflow.
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pull requests build and then stop, so the Dockerfile is exercised
      # without anything reaching the registry.
      - name: Build
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      # Each architecture is pushed by digest; the manifest below joins them
      # under the human-readable tags.
      - name: Build and push by digest
        id: push
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export the digest
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.push.outputs.digest }}

      - name: Upload the digest
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ strategy.job-index }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Publish the manifest
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download the digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          merge-multiple: true
          path: ${{ runner.temp }}/digests

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve the tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          tags="--tag ${IMAGE}:${GITHUB_SHA}"
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            version="${GITHUB_REF_NAME}"
            tags="${tags} --tag ${IMAGE}:${version} --tag ${IMAGE}:latest"
          else
            tags="${tags} --tag ${IMAGE}:main"
          fi
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Create and push the manifest
        working-directory: ${{ runner.temp }}/digests
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2046
          docker buildx imagetools create ${{ steps.tags.outputs.tags }} \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Image"
            echo ""
            echo "- \`${IMAGE}:${GITHUB_SHA}\`"
            if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
              echo "- \`${IMAGE}:${GITHUB_REF_NAME}\`"
              echo "- \`${IMAGE}:latest\`"
            else
              echo "- \`${IMAGE}:main\`"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
